name: Vietlott Auto Crawl

on:
  schedule:
    - cron: '30 6,14 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout mã nguồn
        uses: actions/checkout@v3

      - name: Cài đặt Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Cài đặt thư viện cào dữ liệu
        run: npm install axios cheerio

      - name: Chạy Script cào dữ liệu
        run: node crawl.js

      - name: Cập nhật và đẩy file mới lên Host
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "action@github.com"
          git add 535.txt 645.txt 655.txt
          git diff --quiet && git diff --staged --quiet || (git commit -m "Robot tự động cập nhật kết quả mới" && git push origin HEAD:main)
