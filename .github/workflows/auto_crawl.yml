name: Vietlott Auto Crawl

on:
  schedule:
    - cron: '30 6,14 * * *' # Tự động chạy lúc 13h30 và 21h30 hàng ngày (Giờ Việt Nam)
  workflow_dispatch: # Cho phép Đại ca bấm nút chạy thủ công bất kỳ lúc nào

# CẤP QUYỀN ĐỂ ROBOT CÓ THỂ GHI ĐÈ VÀ ĐẨY FILE TEXT LÊN HOST ONLINE
permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout mã nguồn
        uses: actions/checkout@v3

      - name: Cài đặt Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Cài đặt thư viện cào dữ liệu
        run: npm install axios cheerio

      - name: Chạy Script cào dữ liệu
        run: node crawl.js

      - name: Cập nhật và đẩy file mới lên Host
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "action@github.com"
          git add 535.txt 645.txt 655.txt
          
          # Ép hệ thống luôn commit và push kể cả dữ liệu trùng nhau để làm mới thời gian trên Host
          git commit -m "Robot tự động làm mới kết quả" --allow-empty || true
          git push origin HEAD:main
