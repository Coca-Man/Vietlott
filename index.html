        html, body {

            min-height: 100vh;

            padding: 0;
            overflow: hidden;
            box-sizing: border-box;

        body {

            background-color: #0d0d11; 
            color: #fff; 
            display: flex;
            flex-direction: column;
            padding: 6px;

        body::before {
            content: "CVN PREMIUM SYSTEMS";
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-25deg);
            font-size: 8vw;
            font-weight: 900;
            color: rgba(0, 242, 254, 0.012);
            z-index: -1;
            pointer-events: none;
            white-space: nowrap;
            letter-spacing: 15px;
            font-family: 'Arial Black', sans-serif;

        .header-premium { 
            background: #111118; 
            padding: 4px 15px; 
            border-radius: 6px; 
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.25), inset 0 0 10px rgba(255, 0, 127, 0.15); 
            margin-bottom: 6px; 
            border: 1px solid #222235;
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            animation: neonFlicker 5s infinite;
        }
        @keyframes neonFlicker {
            0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% {
                border-color: #222235;
                box-shadow: 0 0 15px rgba(0, 242, 254, 0.25), inset 0 0 10px rgba(255, 0, 127, 0.15);
            }
            20%, 22%, 24%, 55% {
                border-color: #00f2fe;
                box-shadow: 0 0 25px rgba(0, 242, 254, 0.7), 0 0 10px rgba(255, 0, 127, 0.5), inset 0 0 15px rgba(0, 242, 254, 0.3);
            }
        }
        .header-premium::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, #ff007f, #7928ca, #00f2fe, #ffab00, #ff007f);
            background-size: 300% 100%;
            animation: premiumNeonBar 4s linear infinite;
        }
        @keyframes premiumNeonBar {
            0% { background-position: 0% 50%; }
            100% { background-position: 300% 50%; }
        }
        .header-logo {
            height: 24px;
            width: auto;
            border-radius: 4px;
            filter: drop-shadow(0 0 4px rgba(0, 242, 254, 0.6));
        }
        .title-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .header-premium h1 { 
            margin: 0; 
            font-size: 1.15rem; 
            font-weight: 900; 
            text-transform: uppercase; 
            color: #fff;
            letter-spacing: 1.2px;
            text-shadow: 0 0 3px #fff, 0 0 8px #00f2fe, 0 0 15px #7928ca;
            animation: textPulse 3s infinite alternate;
        }
        @keyframes textPulse {
            0% { text-shadow: 0 0 3px #fff, 0 0 6px #00f2fe, 0 0 12px #7928ca; }
            100% { text-shadow: 0 0 5px #fff, 0 0 12px #00f2fe, 0 0 20px #ff007f; }

        .cosmic-icon {
            font-size: 1rem;
            animation: cosmicBlink var(--delay, 1s) infinite alternate;

        .icon-sun { color: #ffab00; text-shadow: 0 0 8px #ffab00; --delay: 1.4s; }
        .icon-star { color: #fff370; text-shadow: 0 0 6px #fff370; --delay: 0.7s; }
        .icon-moon { color: #00f2fe; text-shadow: 0 0 8px #00f2fe; --delay: 1.8s; }
        @keyframes cosmicBlink {
            0%, 88% { opacity: 1; transform: scale(1); filter: drop-shadow(0 0 5px currentColor); }
            92%, 96% { opacity: 0.2; transform: scale(0.9); filter: none; }
            94%, 100% { opacity: 1; transform: scale(1.05); filter: drop-shadow(0 0 8px currentColor); }
        }
        .container { 
            display: flex; 
            gap: 8px; 
            flex: 1;
            min-height: 0;
            height: calc(100vh - 45px);
        }

    <script>
        let currentType = 'lotto';
        let currentView = 'matrix';
        let loadedFileNames = {
            lotto: "Chọn File Lotto 5/35 (.txt)",
            mega: "Chọn File Mega 6/45 (.txt)",
            power: "Chọn File Power 6/55 (.txt)"
        };
        let testSets = {
            lotto: { main: [], spec: null },
            mega: { main: [] },
            power: { main: [], spec: null }
        };
        let activePredictions = [];

        function getHeatmapColor(count, maxCount) {
            if (count === 0) return '#f8fafc';
            if (maxCount <= 0) return '#22c55e';
            let ratio = count / maxCount;
            let r, g, b;
            if (ratio <= 0.5) {
                let localRatio = ratio / 0.5;
                r = Math.round(34 + (249 - 34) * localRatio);
                g = Math.round(197 + (115 - 197) * localRatio);
                b = Math.round(94 + (22 - 94) * localRatio);
            } else {
                let localRatio = (ratio - 0.5) / 0.5;
                r = Math.round(249 + (239 - 249) * localRatio);
                g = Math.round(115 + (68 - 115) * localRatio);
                b = Math.round(22 + (68 - 22) * localRatio);
            }
            return `rgb(${r}, ${g}, ${b})`;
        }

        function getSmartPredictedSet(size, maxRange) {
            let inputs = document.querySelectorAll('.lock-main-val');
            let locked = [];
            inputs.forEach(input => {
                let v = input.value.trim();
                if(v !== "") {
                    let n = parseInt(v);
                    if(n >= 1 && n <= maxRange) locked.push(String(n).padStart(2, '0'));
                }
            });
            let pool = [];
            for(let i = 1; i <= maxRange; i++) {
                let s = String(i).padStart(2, '0');
                if(!locked.includes(s)) pool.push(s);
            }
            for (let i = pool.length - 1; i > 0; i--) {
                let j = Math.floor(Math.random() * (i + 1));
                [pool[i], pool[j]] = [pool[j], pool[i]];
            }
            let resultSet = [...locked];
            while(resultSet.length < size && pool.length > 0) {
                resultSet.push(pool.shift());
            }
            return resultSet.sort((a,b) => parseInt(a) - parseInt(b));
        }

                        pool.sort((a, b) => {

                    } 
                    else if (currentAlgo === 'nobet') {
                        // Né triệt để số vừa ra kỳ trước, đẩy chúng xuống cuối bể số
                        pool.sort((a, b) => {
                            let isA_Last = lastDraw.includes(a) ? 1 : 0;
                            let isB_Last = lastDraw.includes(b) ? 1 : 0;
                            return isA_Last - isB_Last;
                        });
                    }
                    else if (currentAlgo === 'pair' || currentAlgo === 'combined') {
                        // Thuật toán Bạc nhớ: Nếu Đại ca có khóa số nuôi, ưu tiên các số hay nổ cùng số nuôi đó trong 60 kỳ
                        if (locked.length > 0) {
                            let pairCounts = Array(maxRange + 1).fill(0);
                            rows.forEach(r => {
                                let hasLocked = locked.some(l => r.main.includes(l));
                                if (hasLocked) {
                                    r.main.forEach(num => pairCounts[parseInt(num)]++);
                                }
                            });
                            pool.sort((a, b) => pairCounts[parseInt(b)] - pairCounts[parseInt(a)]);
                        } else {
                            // Nếu không khóa số nào, xáo trộn ngẫu nhiên tạo biến số
                            pool.sort(() => Math.random() - 0.5);
                        }
                    }

                    // Nhặt số từ bể số đã được các thuật toán tối ưu xếp hàng
                    let resultSet = [...locked];
                    while (resultSet.length < mainSize && pool.length > 0) {
                        resultSet.push(pool.shift());
                    }
                    resultSet.sort((a, b) => parseInt(a) - parseInt(b));

                    // XỬ LÝ QUẢ BÓNG ĐẶC BIỆT MÀU CAM (Lotto hoặc Power)[cite: 1]
                    let sNum = "";
                    if (currentType !== 'mega') { //[cite: 1]
                        let specInput = document.querySelector('.lock-spec-val'); //[cite: 1]
                        if (specInput && specInput.value.trim() !== "") { //[cite: 1]
                            let val = parseInt(specInput.value.trim()); //[cite: 1]
                            let maxSpec = currentType === 'lotto' ? 12 : 55; //[cite: 1]
                            if (val >= 1 && val <= maxSpec) sNum = String(val).padStart(2, '0');
                        }
                        if (!sNum) {
                            let maxSpec = currentType === 'lotto' ? 12 : 55; //[cite: 1]
                            sNum = String(Math.floor(Math.random() * maxSpec) + 1).padStart(2, '0');
                        }
                    }

                    // Lưu bộ số sạch vào bộ nhớ tạm hệ thống để chuẩn bị nút "Soạn" hoặc "Thử"[cite: 1]
                    if (currentType === 'mega') { //[cite: 1]
                        activePredictions.push({ main: resultSet }); //[cite: 1]
                    } else {
                        activePredictions.push({ main: resultSet, spec: sNum }); //[cite: 1]
                    }

                    // DỰNG GIAO DIỆN HIỂN THỊ KẾT QUẢ ĐÃ PHÂN TÍCH[cite: 1]
                    let rowDiv = document.createElement('div'); rowDiv.className = 'predict-row'; //[cite: 1]
                    let rowInner = `<div class="predict-row-label">${labels[i]}</div>`; //[cite: 1]
                    resultSet.forEach(num => { rowInner += `<div class="ball-predict" style="background-color: #006633">${num}</div>`; }); //[cite: 1]
                    
                    if (currentType !== 'mega') { //[cite: 1]
                        rowInner += `<div style="color:#555; font-weight:bold;">|</div><div class="ball-predict" style="background-color: #ff7300">${sNum}</div>`; //[cite: 1]
                    }
                    
                    rowInner += `<div style="flex:1;"></div>`; //[cite: 1]
                    rowInner += `<button class="action-inline-btn btn-try" onclick="tryOnMatrix('${currentType}', '${resultSet.join(',')}', ${sNum ? "'"+sNum+"'" : 'null'})">Thử</button>`; //[cite: 1]
                    rowInner += `<button class="action-inline-btn btn-del" style="margin-left:2px;" onclick="clearTestMatrix('${currentType}')">Xoá</button>`; //[cite: 1]
                    rowInner += `<button class="action-inline-btn btn-compose" style="margin-left:2px;" onclick="openComposeModal('${currentType}', ${i})">Soạn</button>`; //[cite: 1]
                    rowDiv.innerHTML = rowInner; //[cite: 1]
                    container.appendChild(rowDiv); //[cite: 1]
                }
            }, 150);
        }

        window.onload = function() { 
            // KHÔNG XÓA NỮA: Tự động kiểm tra và nạp lại dữ liệu cũ đã lưu khi Đại ca F5 trang web
            let savedLotto = localStorage.getItem('raw_data_lotto');
            let savedMega = localStorage.getItem('raw_data_mega');
            let savedPower = localStorage.getItem('raw_data_power');

            if (savedLotto) loadedFileNames.lotto = "Dữ liệu đang lưu (Host)";
            if (savedMega) loadedFileNames.mega = "Dữ liệu đang lưu (Host)";
            if (savedPower) loadedFileNames.power = "Dữ liệu đang lưu (Host)";

            setupPredictPanel();
            reloadCurrentMatrix(); // Tự động vẽ lại biểu đồ ngay lập tức
        };
    </script>
</body>
